name: Tests

on:
  push:
  pull_request:

jobs:
  image-compression:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: ./bin/check-images.sh
  shellcheck:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: sudo apt-get install shellcheck
    - run: ./bin/check-scripts.sh
  unit-tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: package.json
        cache: 'npm'
    - run: npm ci
    - run: npm run build
    - run: npm run lint
    - uses: browser-actions/setup-chrome@v2
    - run: npm run test -w=@getodk/central-frontend
  build:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: package.json
        cache: 'npm'
    - run: ./bin/check-for-large-files.sh
    - run: npm ci
    - run: npm run build
    - run: ./bin/check-bundle-size.cjs
  build-wf:
    if: ${{ github.event_name == 'pull_request' || github.event.pull_request.head.repo.fork }}
    name: 'Build Web Forms'
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.19.3', '22.12.0', '24.13.0']
    steps:
      - uses: 'actions/checkout@v5'
      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'
      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('package-lock.json', '.npmrc', '.github/workflows/ci.yml', 'examples/*/package-lock.json', 'packages/*/package.json', 'packages/*/package-lock.json') }}
      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}
      - run: 'npm ci'
      - run: 'npm run build'
  e2e-tests:
    needs:
    - build
    - image-compression
    - shellcheck
    - unit-tests
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:

    # This one weird trick speeds up every build!
    # see: https://github.com/getodk/central-backend/pull/1642
    # see: https://github.com/actions/runner/issues/4030
    - run: sudo apt-get remove --purge man-db

    - uses: actions/checkout@v6
      with:
        path: client
        fetch-depth: 0
    - name: Clone getodk/central repo
      run: |
        git clone -b next https://github.com/getodk/central.git
        cd central
        git submodule set-branch -b master server
        git submodule update --init --remote server
        mv ../client .
    - name: Modify files
      working-directory: central
      run: |
        yq e '.services.enketo.extra_hosts += ["${DOMAIN}:host-gateway"]' -i docker-compose.yml
        sed -i 's|\${BASE_URL}|http://${DOMAIN}|g' files/enketo/config.json.template
        sed -i 's|\${BASE_URL}|http://${DOMAIN}|g' files/service/config.json.template
        sed -i 's/\$scheme/https/g' files/nginx/odk.conf.template
        sed 's/your.domain.com/central-test.localhost/; s/^SSL_TYPE=letsencrypt/SSL_TYPE=upstream/' .env.template > .env
    - name: Add domain
      run: echo '127.0.0.1 central-test.localhost' | sudo tee --append /etc/hosts
    - name: Start services
      working-directory: central
      run: touch ./files/allow-postgres14-upgrade && docker compose build && docker compose up -d
    - name: Set node version
      uses: actions/setup-node@v6
      with:
        node-version-file: central/client/package.json
        cache: 'npm'
        cache-dependency-path: 'central/client/package-lock.json'
    - name: Run tests
      working-directory: central
      run: client/e2e-tests/run-tests.sh --domain=central-test.localhost --port=80
    - name: Archive playwright result
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Playwright Artifacts
        path: central/client/test-results
  wf-tests:
    name: 'Run Web Forms Tests'
    needs:
    - build-wf
    uses: ./.github/workflows/wf-ci.yml
  wf-e2e-tests:
    name: 'Run Web Forms E2E Tests'
    needs:
    - wf-tests
    uses: ./.github/workflows/wf-ci-e2e.yml
