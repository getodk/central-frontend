name: Tests

on:
  push:
    branches:
      - '**'
    tags:
      - 'v**'
  pull_request:

jobs:
  image-compression:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: ./bin/check-images.sh
  shellcheck:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: sudo apt-get install shellcheck
    - run: ./bin/check-scripts.sh
  unit-tests:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: package.json
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - uses: browser-actions/setup-chrome@v2
    - run: npm run test
  build:
    needs:
    - image-compression
    - shellcheck
    - unit-tests
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: package.json
        cache: 'npm'
    - run: ./bin/check-for-large-files.sh
    - run: npm ci
    - run: npm run build
    - run: ./bin/check-bundle-size.js

    - if: github.ref_type == 'tag'
      run: |
        tar -cvzf dist.tar.gz dist/
        gh release create ${{ github.ref_name }} dist.tar.gz --generate-notes
