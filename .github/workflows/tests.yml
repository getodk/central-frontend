name: Tests

on:
  push:
    branches:
      - '**'
    tags:
      - 'v**'
  pull_request:

jobs:
  check-and-build:
    name: 'Static check and build'
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: sudo apt-get install shellcheck
    - run: ./bin/check-scripts.sh
    - run: ./bin/check-for-large-files.sh
    - run: ./bin/check-images.sh
    - uses: actions/setup-node@v6
      id: setup-node
      with:
        node-version-file: package.json
        cache: 'npm'
    - run: npm ci
    - run: npm run build
    - run: npm run lint
    - run: ./bin/check-bundle-size.js
    - uses: 'actions/cache/save@v5'
      id: cache-install
      with:
        path: |
          node_modules
          **/node_modules
        key: install-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json', '.npmrc', '.github/workflows/*.yml', 'packages/*/package.json', 'packages/*/package-lock.json') }}
    - uses: 'actions/cache/save@v5'
      id: cache-build
      with:
        path: |
          dist
          packages/*/dist
        key: build-${{ github.sha }}
    - name: Upload Release Artefact
      if: github.ref_type == 'tag'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        tar -cvzf dist-${{ github.ref_name }}.tar.gz dist/
        echo "Uploading dist bundle..."
        gh release upload ${{ github.ref_name }} dist-${{ github.ref_name }}.tar.gz
        echo "Upload complete."

  test-central-app:
    name: 'Test central app'
    needs:
    - check-and-build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      id: setup-node
      with:
        node-version-file: package.json
        cache: 'npm'
    - uses: 'actions/cache@v5'
      id: cache-install
      with:
        path: |
          node_modules
          **/node_modules
        key: install-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json', '.npmrc', '.github/workflows/*.yml', 'packages/*/package.json', 'packages/*/package-lock.json') }}
        fail-on-cache-miss: true
    - uses: 'actions/cache@v5'
      id: cache-build
      with:
        path: |
          dist
          packages/*/dist
        key: build-${{ github.sha }}
        fail-on-cache-miss: true
    - run: npm run test -w=@getodk/central-frontend

  test-forms-app:
    name: 'Test forms app'
    needs:
    - check-and-build
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      id: setup-node
      with:
        node-version-file: package.json
        cache: 'npm'
    - uses: 'actions/cache@v5'
      id: cache-install
      with:
        path: |
          node_modules
          **/node_modules
        key: install-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json', '.npmrc', '.github/workflows/*.yml', 'packages/*/package.json', 'packages/*/package-lock.json') }}
        fail-on-cache-miss: true
    - uses: 'actions/cache@v5'
      id: cache-build
      with:
        path: |
          dist
          packages/*/dist
        key: build-${{ github.sha }}
        fail-on-cache-miss: true
    - run: npx playwright install chromium --with-deps
    - run: npm run test -w=@getodk/forms

  e2e-tests:
    name: 'Test apps e2e'
    needs:
    - test-central-app
    - test-forms-app
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:

    # This one weird trick speeds up every build!
    # see: https://github.com/getodk/central-backend/pull/1642
    # see: https://github.com/actions/runner/issues/4030
    - run: sudo apt-get remove --purge man-db
    - uses: actions/checkout@v6
      with:
        path: client
        fetch-depth: 0
    - name: Clone getodk/central repo
      run: |
        git clone -b next https://github.com/getodk/central.git
        cd central
        git submodule set-branch -b master server
        git submodule update --init --remote server
        mv ../client .
    - name: Modify files
      working-directory: central
      run: |
        yq e '.services.enketo.extra_hosts += ["${DOMAIN}:host-gateway"]' -i docker-compose.yml
        sed -i 's|\${BASE_URL}|http://${DOMAIN}|g' files/enketo/config.json.template
        sed -i 's|\${BASE_URL}|http://${DOMAIN}|g' files/service/config.json.template
        sed -i 's/\$scheme/https/g' files/nginx/odk.conf.template
        sed -Ei 's/https:([ ;]|$)/http:\1/g' files/nginx/odk.conf.template
        sed 's/your.domain.com/central-test.localhost/; s/^SSL_TYPE=letsencrypt/SSL_TYPE=upstream/' .env.template > .env
    - name: Add domain
      run: echo '127.0.0.1 central-test.localhost' | sudo tee --append /etc/hosts
    - name: Start services
      working-directory: central
      run: touch ./files/allow-postgres14-upgrade && docker compose build --build-arg FRONTEND_BUILD_MODE=source && docker compose up -d
    - name: Set node version
      uses: actions/setup-node@v6
      with:
        node-version-file: central/client/package.json
        cache: 'npm'
        cache-dependency-path: 'central/client/package-lock.json'
    - name: Run tests
      working-directory: central
      run: client/e2e-tests/run-tests.sh --domain=central-test.localhost --port=80
    - name: Archive playwright result
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: Playwright Artifacts
        path: central/client/test-results
    - if: always()
      name: Docker Container Logs
      working-directory: central
      run: docker compose logs || true

  wf-tests:
    name: 'Test web-forms packages'
    needs:
    - check-and-build
    uses: ./.github/workflows/wf-ci.yml

  wf-e2e-tests:
    name: 'Test web-forms e2e'
    needs:
    - wf-tests
    uses: ./.github/workflows/wf-ci-e2e.yml
