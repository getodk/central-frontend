name: Web Forms E2E Tests

on:
  workflow_call:

jobs:
  web-forms-e2e-functional:
    name: '@getodk/web-forms (functional e2e)'
    runs-on: 'ubuntu-latest'

    strategy:
      fail-fast: false
      matrix:
        node-version: ['24.13.0']
        browser: [chromium, firefox, webkit]

    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'

      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('package-lock.json', '.npmrc', '.github/workflows/ci.yml', 'examples/*/package-lock.json', 'packages/*/package.json', 'packages/*/package-lock.json') }}
          fail-on-cache-miss: true

      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}
          fail-on-cache-miss: true

      - run: 'npx playwright install ${{ matrix.browser }} --with-deps'

      - name: 'Run functional e2e tests'
        run: 'npm run test:e2e:functional:${{ matrix.browser }} -w=packages/web-forms'

      - name: 'Upload Playwright results'
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-functional-${{ matrix.browser }}
          path: packages/web-forms/test-results
          retention-days: 10
          if-no-files-found: ignore

  web-forms-e2e-visual:
    name: '@getodk/web-forms (visual e2e)'
    runs-on: 'ubuntu-latest'

    strategy:
      fail-fast: false
      matrix:
        node-version: ['24.13.0']
        browser: [chromium, firefox, webkit]

    steps:
      - uses: 'actions/checkout@v5'

      - uses: 'volta-cli/action@v5'
        with:
          node-version: '${{ matrix.node-version }}'

      - uses: 'actions/cache@v5'
        id: cache-install
        with:
          path: |
            node_modules
            **/node_modules
          key: install-${{ matrix.node-version }}-${{ hashFiles('package-lock.json', '.npmrc', '.github/workflows/ci.yml', 'examples/*/package-lock.json', 'packages/*/package.json', 'packages/*/package-lock.json') }}
          fail-on-cache-miss: true

      - uses: 'actions/cache@v5'
        id: cache-build
        with:
          path: |
            examples/*/dist
            packages/*/dist
            packages/web-forms/dist-demo
          key: build-${{ matrix.node-version }}-${{ github.sha }}
          fail-on-cache-miss: true

      - run: 'npx playwright install ${{ matrix.browser }} --with-deps'

      # xvfb-run is used for visual tests to compare snapshots more accurately.
      - name: 'Run visual e2e tests'
        run: 'xvfb-run --auto-servernum npm run test:e2e:visual:${{ matrix.browser }} -w=packages/web-forms'

      - name: 'Upload Playwright results'
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-visual-${{ matrix.browser }}
          path: packages/web-forms/test-results
          retention-days: 10
          if-no-files-found: ignore
